name: Reusable crate CI

# Reusable CI workflow shared by every OxideAV sibling crate. Each crate
# opts in via a one-line shim:
#
#   jobs:
#     ci:
#       uses: OxideAV/.github/.github/workflows/crate-ci.yml@master
#       secrets: inherit
#
# Jobs:
#   * test  — build + cargo test on the OS matrix (default: ubuntu, macos, windows)
#   * lint  — rustfmt --check + clippy --all-targets -- -D warnings
#   * miri  — runs `cargo miri test --all-targets` on nightly with
#             strict-provenance + disabled isolation. Default ON so that
#             arena/SIMD/raw-ptr UB regressions are caught in CI everywhere
#             rather than via external audits. Crates that legitimately
#             can't run miri (heavy FFI, syscalls miri doesn't support)
#             can opt out with `enable_miri: false`.

on:
  workflow_call:
    inputs:
      enable_miri:
        description: "Run a miri job on nightly with strict-provenance (default true)"
        type: boolean
        required: false
        default: true
      extra_test_args:
        description: "Extra args appended to `cargo test`"
        type: string
        required: false
        default: ""
      rust_toolchain:
        description: "Toolchain channel for the test job (e.g. stable, 1.76.0)"
        type: string
        required: false
        default: "stable"
      os_matrix:
        description: "JSON array of runner OSes for the test job"
        type: string
        required: false
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (${{ inputs.rust_toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets --verbose

      - name: Test
        run: cargo test --verbose ${{ inputs.extra_test_args }}

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo fmt -- --check
        run: cargo fmt -- --check

      - name: cargo clippy --no-deps -- -D warnings
        run: cargo clippy --all-targets --no-deps -- -D warnings

  miri:
    name: miri (nightly, strict-provenance)
    if: ${{ inputs.enable_miri }}
    runs-on: ubuntu-latest
    # Throttled to once per UTC day per branch. Miri is slow (5–15 min)
    # and most pushes don't change unsafe code, so re-running on every
    # push wastes CI minutes. The actions/cache key embeds the UTC date;
    # first run of the day misses the cache + runs miri + saves the
    # marker, subsequent runs the same day hit the cache + skip. A push
    # the next UTC day rotates the key + runs again. Branches get their
    # own throttle (cache is per-branch). To force a re-run on the same
    # day, push an empty commit or use `gh workflow run`.
    steps:
      - name: Compute throttle key
        id: throttle
        run: echo "key=miri-throttle-${{ github.ref_name }}-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Check daily throttle
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .miri-throttle-marker
          key: ${{ steps.throttle.outputs.key }}

      - name: Skip note (already ran today)
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "::notice::Miri already ran today on this branch; skipping. Push an empty commit or 'gh workflow run' to force."

      - uses: actions/checkout@v6
        if: steps.cache.outputs.cache-hit != 'true'

      - name: Install Rust nightly + miri
        if: steps.cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cargo cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: miri

      - name: cargo miri setup
        if: steps.cache.outputs.cache-hit != 'true'
        run: cargo miri setup

      - name: cargo miri test --all-targets
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
        run: cargo miri test --all-targets

      - name: Write throttle marker
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .miri-throttle-marker
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) commit=${{ github.sha }}" > .miri-throttle-marker/last_run

      - name: Save throttle cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .miri-throttle-marker
          key: ${{ steps.throttle.outputs.key }}
