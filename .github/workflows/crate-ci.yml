name: Reusable crate CI

# Reusable CI workflow shared by every OxideAV sibling crate. Each crate
# opts in via a one-line shim:
#
#   jobs:
#     ci:
#       uses: OxideAV/.github/.github/workflows/crate-ci.yml@master
#       secrets: inherit
#
# Jobs:
#   * test  — build + cargo test on the OS matrix (default: ubuntu, macos, windows)
#   * lint  — rustfmt --check + clippy --all-targets -- -D warnings
#   * miri  — runs `cargo miri test --all-targets` on nightly with
#             strict-provenance + disabled isolation. Manual-only: only
#             fires when the workflow is triggered via workflow_dispatch
#             (Actions UI "Run workflow" button).

on:
  workflow_call:
    inputs:
      extra_test_args:
        description: "Extra args appended to `cargo test`"
        type: string
        required: false
        default: ""
      rust_toolchain:
        description: "Toolchain channel for the test job (e.g. stable, 1.76.0)"
        type: string
        required: false
        default: "stable"
      os_matrix:
        description: "JSON array of runner OSes for the test job"
        type: string
        required: false
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      extra_packages_apt:
        description: "Space-separated apt packages to install on Linux (e.g. `ffmpeg libwebp-dev`)"
        type: string
        required: false
        default: ""
      extra_packages_brew:
        description: "Space-separated brew formulas to install on macOS"
        type: string
        required: false
        default: ""
      extra_packages_choco:
        description: "Space-separated chocolatey packages to install on Windows"
        type: string
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (${{ inputs.rust_toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Install extra apt packages (Linux)
        if: runner.os == 'Linux' && inputs.extra_packages_apt != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ${{ inputs.extra_packages_apt }}

      - name: Install extra brew packages (macOS)
        if: runner.os == 'macOS' && inputs.extra_packages_brew != ''
        run: brew install ${{ inputs.extra_packages_brew }}

      - name: Install extra chocolatey packages (Windows)
        if: runner.os == 'Windows' && inputs.extra_packages_choco != ''
        run: choco install -y ${{ inputs.extra_packages_choco }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets --verbose

      - name: Test
        run: cargo test --verbose ${{ inputs.extra_test_args }}

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo fmt -- --check
        run: cargo fmt -- --check

      - name: cargo clippy --no-deps -- -D warnings
        run: cargo clippy --all-targets --no-deps -- -D warnings

  miri:
    name: miri (nightly, strict-provenance)
    # Manual-only: miri is slow (5-15 min) and most pushes don't change
    # unsafe code. To run, go to the Actions tab and trigger the workflow
    # manually (workflow_dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly + miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: miri

      - name: cargo miri setup
        run: cargo miri setup

      - name: cargo miri test --all-targets
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
        run: cargo miri test --all-targets
